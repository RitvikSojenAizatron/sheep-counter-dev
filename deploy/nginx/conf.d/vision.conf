map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name sheep_counter.local _;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ===============================
    # API (FastAPI)
    # ===============================
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 60s;
    }

    location /snapshots/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 60s;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 60s;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 60s;
    }

    # ===============================
    # WEBSOCKET (FastAPI /ws)
    # ===============================
    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 600s;
    }

    # ===============================
    # WHEP (MediaMTX)
    # Frontend calls: /whep/<stream>
    # MediaMTX expects: /<stream>/whep
    # ===============================
    location ~ ^/whep/(.+)$ {
        proxy_pass http://127.0.0.1:8889/$1/whep;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # MediaMTX also sets its own CORS headers (webrtcAllowOrigin in
        # mediamtx.yml). Without hiding them here, the client sees duplicate
        # Access-Control-Allow-* headers, which browsers reject outright —
        # breaking the WHEP fetch before WebRTC/ICE ever gets a chance to run.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET,POST,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type,Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ===============================
    # WHIP (optional future)
    # ===============================
    location ~ ^/whip/(.+)$ {
        proxy_pass http://127.0.0.1:8889/$1/whip;
        proxy_read_timeout 300s;
    }

    # ===============================
    # FRONTEND
    # Dev:  npm run dev  (Vite on 5173)
    # Prod: served by FastAPI static files
    # ===============================
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_read_timeout 60s;

        # Vite HMR websocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
